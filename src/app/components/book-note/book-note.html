<div class="ios-note" role="button" tabindex="0" (click)="open()">
    <div class="ios-note__text">
        <div class="ios-note__title">{{ title }}</div>
        <div class="ios-note__subtitle">{{ author }}</div>
    </div>

    <div class="ios-note__actions">
        <button type="button" class="ios-note__delete" aria-label="Delete book"
            (click)="delete($event)">
            <!-- icon -->
            <svg class="ios-note__trash" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v10h-2V9zm4 0h2v10h-2V9zM7 9h2v10H7V9z" />
            </svg>
        </button>
    </div>
</div>
