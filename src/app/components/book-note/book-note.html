<ion-item button detail (click)="open()">
    <ion-label>
        <h3>{{ book().data.name }}</h3>
        <p>{{ book().data.author }}</p>
    </ion-label>
    <ion-button slot="end" fill="clear" color="danger" aria-label="Buch löschen"
        (click)="delete($event)">
        <ion-icon slot="icon-only" [icon]="trashOutline" />
    </ion-button>
</ion-item>
